server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Encaminha chamadas da API para o serviço do backend (docker-compose: "server").
  location /api/ {
    proxy_pass http://server:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  # SPA: qualquer rota desconhecida cai no index.html (React Router).
  location / {
    try_files $uri $uri/ /index.html;
  }
}
