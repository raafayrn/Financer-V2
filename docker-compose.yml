services:
  server:
    build: ./server
    environment:
      PORT: 4000
      # Caminho absoluto para o banco fora de /app/prisma (assim o volume não
      # esconde o schema.prisma da imagem).
      DATABASE_URL: "file:/data/dev.db"
      JWT_SECRET: "${JWT_SECRET:?defina JWT_SECRET no .env — veja server/.env.example}"
      JWT_EXPIRES_IN: "7d"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      CORS_ORIGIN: "${CORS_ORIGIN:-*}"
    volumes:
      # Persiste o arquivo SQLite entre reinícios do container.
      - db-data:/data
    restart: unless-stopped

  client:
    build: ./client
    ports:
      - "8080:80"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  db-data:
